<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="400" height="400" fill="#21c4ff" rx="40"/>
  
  <g transform="translate(0, 15)">
    <!-- Right Flipper -->
    <path d="M 230 180 C 280 200, 280 270, 250 280 C 230 290, 230 250, 240 220 Z" fill="#0b0b0b"/>
    
    <!-- Left Flipper (waving) -->
    <path d="M 150 185 C 110 170, 100 130, 120 120 C 135 110, 160 140, 165 160 Z" fill="#0b0b0b"/>
    
    <!-- Body -->
    <path d="M 155 140 C 155 50, 245 50, 245 140 C 260 250, 255 315, 200 315 C 145 315, 140 250, 155 140 Z" fill="#0b0b0b"/>
    
    <!-- White Belly -->
    <ellipse cx="200" cy="235" rx="35" ry="50" fill="#ffffff"/>
    
    <!-- Eyes -->
    <circle cx="185" cy="115" r="6" fill="#ffffff"/>
    <circle cx="215" cy="115" r="6" fill="#ffffff"/>
    
    <!-- Beak -->
    <path d="M 175 135 Q 200 125 225 135 Q 200 155 175 135 Z" fill="#ea7613"/>
    
    <!-- Feet (drawn after body to overlap slightly) -->
    <path d="M 145 310 C 145 285, 195 285, 195 310 Z" fill="#ea7613"/>
    <path d="M 205 310 C 205 285, 255 285, 255 310 Z" fill="#ea7613"/>
  </g>
</svg>
