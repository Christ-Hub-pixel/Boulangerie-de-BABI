<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paiement Sécurisé - Boulangerie de Babi</title>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/animations.css">
</head>
<body style="background-color: #f5f5f5;" class="d-flex flex-column min-vh-100">

    <!-- Secure Header -->
    <header class="shadow-sm fixed-top" style="background: rgba(43, 22, 12, 0.95); backdrop-filter: blur(10px);">
        <div class="container d-flex justify-content-between align-items-center py-3">
            <a class="text-decoration-none d-flex align-items-center" href="index.html">
                <img src="assets/logo.png" alt="Logo" style="height: 45px; border-radius: 8px; margin-right: 10px;">
                <div class="d-flex flex-column lh-1">
                    <span class="fw-bold text-white" style="font-size: clamp(1rem, 2.5vw, 1.2rem); font-family: 'Inter', sans-serif;">Boulangerie</span>
                    <span class="text-primary" style="font-size: clamp(1.2rem, 3.5vw, 1.5rem); font-family: 'Great Vibes', cursive; margin-top: -5px;">de Babi</span>
                </div>
            </a>
            <div class="d-flex align-items-center text-white fw-bold">
                <i class="fa-solid fa-lock fs-4 me-2 text-success"></i>
                <span class="d-none d-md-inline">Paiement 100% Sécurisé</span>
            </div>
        </div>
    </header>

    <div class="container" style="margin-top: 100px; margin-bottom: 50px;">
        <div class="row g-4">
            <!-- Left Column: Checkout Funnel Accordion -->
            <div class="col-lg-8">
                <div class="accordion" id="checkoutAccordion">
                    
                    <!-- Etape 1: ADRESSE -->
                    <div class="accordion-item border-0 bg-white rounded shadow-sm mb-3">
                        <h2 class="accordion-header">
                            <button class="accordion-button fw-bold fs-5 text-dark" type="button" data-bs-toggle="collapse" data-bs-target="#collapseOne" aria-expanded="true">
                                <i class="fa-regular fa-circle-check text-success me-2"></i> 1. ADRESSE DE LIVRAISON
                            </button>
                        </h2>
                        <div id="collapseOne" class="accordion-collapse collapse show" data-bs-parent="#checkoutAccordion">
                            <div class="accordion-body border-top">
                                <div class="row g-3">
                                    <div class="col-md-6">
                                        <label class="form-label fs-sm text-muted mb-1">Prénom et Nom</label>
                                        <input type="text" class="form-control shadow-none" value="Jean Dupont">
                                    </div>
                                    <div class="col-md-6">
                                        <label class="form-label fs-sm text-muted mb-1">Numéro de téléphone</label>
                                        <input type="tel" class="form-control shadow-none" value="+225 01 23 45 67 89">
                                    </div>
                                    <div class="col-12">
                                        <label class="form-label fs-sm text-muted mb-1">Commune</label>
                                        <select class="form-select shadow-none">
                                            <option>Cocody</option>
                                            <option>Marcory</option>
                                            <option>Yopougon</option>
                                            <option>Plateau</option>
                                        </select>
                                    </div>
                                    <div class="col-12">
                                        <label class="form-label fs-sm text-muted mb-1">Adresse complète</label>
                                        <input type="text" class="form-control shadow-none" value="Angré, 8ème Tranche, Résidence Les Oliviers">
                                    </div>
                                    <div class="col-12 text-end mt-4">
                                        <button class="btn btn-primary fw-bold text-dark px-4" type="button" data-bs-toggle="collapse" data-bs-target="#collapseTwo">CONFIRMER L'ADRESSE</button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Etape 2: LIVRAISON -->
                    <div class="accordion-item border-0 bg-white rounded shadow-sm mb-3">
                        <h2 class="accordion-header">
                            <button class="accordion-button collapsed fw-bold fs-5 text-dark" type="button" data-bs-toggle="collapse" data-bs-target="#collapseTwo" aria-expanded="false">
                                <i class="fa-regular fa-circle text-primary me-2"></i> 2. DÉTAILS DE LIVRAISON
                            </button>
                        </h2>
                        <div id="collapseTwo" class="accordion-collapse collapse" data-bs-parent="#checkoutAccordion">
                            <div class="accordion-body border-top">
                                <h6 class="fw-bold mb-3">Choisissez votre mode de livraison</h6>
                                
                                <label class="border rounded p-3 mb-2 border-primary w-100 cursor-pointer" style="background-color: rgba(244, 180, 0, 0.05); cursor: pointer;">
                                    <div class="form-check m-0">
                                        <input class="form-check-input" type="radio" name="delivery" id="d1" checked>
                                        <div class="d-flex justify-content-between ms-2">
                                            <span class="fw-bold">Livraison à Domicile (Express)</span>
                                            <span class="fw-bold">1000 FCFA</span>
                                        </div>
                                    </div>
                                    <small class="text-muted ms-4 d-block mt-1">Livraison garantie entre 30 et 45 minutes par nos livreurs.</small>
                                </label>
                                
                                <label class="border rounded p-3 w-100 cursor-pointer" style="cursor: pointer;">
                                    <div class="form-check m-0">
                                        <input class="form-check-input" type="radio" name="delivery" id="d2">
                                        <div class="d-flex justify-content-between ms-2">
                                            <span class="fw-bold">Retrait en Boutique (Click & Collect)</span>
                                            <span class="fw-bold text-success">Gratuit</span>
                                        </div>
                                    </div>
                                    <small class="text-muted ms-4 d-block mt-1">Boutique de Cocody Riviera 2. Votre commande sera prête dans 15 min.</small>
                                </label>

                                <div class="col-12 text-end mt-4">
                                    <button class="btn btn-primary fw-bold text-dark px-4" type="button" data-bs-toggle="collapse" data-bs-target="#collapseThree">CONFIRMER LA LIVRAISON</button>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Etape 3: PAIEMENT (Jumia Style) -->
                    <div class="accordion-item border-0 bg-white rounded shadow-sm mb-3">
                        <h2 class="accordion-header">
                            <button class="accordion-button collapsed fw-bold fs-5 text-dark" type="button" data-bs-toggle="collapse" data-bs-target="#collapseThree" aria-expanded="false">
                                <i class="fa-regular fa-circle text-primary me-2"></i> 3. MODE DE PAIEMENT
                            </button>
                        </h2>
                        <div id="collapseThree" class="accordion-collapse collapse" data-bs-parent="#checkoutAccordion">
                            <div class="accordion-body border-top">
                                
                                <!-- Mobile Money -->
                                <label class="border rounded p-3 mb-3 w-100 border-primary" style="background-color: rgba(244, 180, 0, 0.05); cursor: pointer;">
                                    <div class="form-check m-0 d-flex align-items-center">
                                        <input class="form-check-input mt-0" type="radio" name="payment" id="p_momo" checked>
                                        <div class="ms-3">
                                            <span class="fw-bold d-block">Mobile Money</span>
                                            <small class="text-muted">Payer de façon sécurisée avec Wave, Orange, MTN ou Moov.</small>
                                        </div>
                                        <div class="ms-auto d-flex gap-1">
                                            <div style="width: 30px; height: 30px; background: #0000ff; border-radius: 4px; display: flex; align-items:center; justify-content:center; color: white; font-weight: bold; font-size: 10px;">WAVE</div>
                                            <div style="width: 30px; height: 30px; background: #ff6600; border-radius: 4px; display: flex; align-items:center; justify-content:center; color: white; font-weight: bold; font-size: 10px;">OM</div>
                                            <div style="width: 30px; height: 30px; background: #ffcc00; border-radius: 4px; display: flex; align-items:center; justify-content:center; color: black; font-weight: bold; font-size: 10px;">MTN</div>
                                        </div>
                                    </div>
                                    <div class="mt-3 p-3 bg-white rounded border d-none d-block">
                                        <p class="fs-sm text-muted mb-2">Veuillez sélectionner votre opérateur :</p>
                                        <select class="form-select shadow-none mb-2">
                                            <option>Wave Côte d'Ivoire</option>
                                            <option>Orange Money</option>
                                            <option>MTN Mobile Money</option>
                                            <option>Moov Money</option>
                                        </select>
                                    </div>
                                </label>

                                <!-- Cash on Delivery -->
                                <label class="border rounded p-3 mb-3 w-100" style="cursor: pointer;">
                                    <div class="form-check m-0 d-flex align-items-center">
                                        <input class="form-check-input mt-0" type="radio" name="payment" id="p_cash">
                                        <div class="ms-3">
                                            <span class="fw-bold d-block">Paiement à la livraison</span>
                                            <small class="text-muted">Payez en espèces lorsque le livreur vous remettra la commande.</small>
                                        </div>
                                        <div class="ms-auto text-success">
                                            <i class="fa-solid fa-money-bill-wave fs-3"></i>
                                        </div>
                                    </div>
                                </label>



                                <div class="col-12 mt-4 text-center">
                                    <button class="btn btn-primary fw-bold text-dark w-100 py-3 fs-5 shadow-sm">CONFIRMER LE PAIEMENT (2650 FCFA)</button>
                                </div>
                            </div>
                        </div>
                    </div>

                </div>
            </div>

            <!-- Right Column: Order Summary (Sticky) -->
            <div class="col-lg-4">
                <div class="bg-white rounded shadow-sm p-3 sticky-top" style="top: 100px;">
                    <h6 class="fw-bold border-bottom pb-2 mb-3">RÉSUMÉ DE LA COMMANDE</h6>
                    
                    <div class="d-flex justify-content-between mb-2 fs-sm">
                        <span>Sous-total de l'article (2)</span>
                        <span class="fw-bold">1650 FCFA</span>
                    </div>
                    <div class="d-flex justify-content-between mb-3 fs-sm border-bottom pb-3">
                        <span>Frais de livraison</span>
                        <span class="fw-bold">1000 FCFA</span>
                    </div>
                    
                    <div class="d-flex justify-content-between mb-4">
                        <span class="fw-bold fs-5">Total</span>
                        <span class="fw-bold fs-5 text-primary">2650 FCFA</span>
                    </div>
                    
                    <button class="btn btn-primary w-100 fw-bold btn-pulse text-dark shadow-sm py-2" style="filter: opacity(0.5); cursor: not-allowed;" title="Veuillez compléter toutes les étapes à gauche.">PASSER LA COMMANDE</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Minimalist Footer -->
    <footer class="py-4 mt-auto" style="background-color: rgba(43, 22, 12, 0.95); border-top: 1px solid rgba(255, 255, 255, 0.1);">
        <div class="container d-flex flex-column align-items-center text-center">
            <div class="logo mb-3 d-flex align-items-center">
                <img src="assets/logo.png" alt="Logo" style="height: 40px; border-radius: 6px; margin-right: 10px;">
                <div class="d-flex flex-column lh-1 text-start">
                    <span class="fw-bold text-white" style="font-size: 1rem; font-family: 'Inter', sans-serif;">Boulangerie</span>
                    <span class="text-primary" style="font-size: 1.2rem; font-family: 'Great Vibes', cursive; margin-top: -5px;">de Babi</span>
                </div>
            </div>
            <p class="text-white-50 fs-sm mb-0">&copy; 2026 Boulangerie de Babi. Tous droits réservés.</p>
        </div>
    </footer>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <script src="js/cart_actions.js"></script>
</body>
</html>
