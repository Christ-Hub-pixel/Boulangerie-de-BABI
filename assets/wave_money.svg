<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="400" height="400" fill="#21c4ff" rx="40"/>
  
  <g transform="translate(0, 15)">
    <!-- Left Flipper -->
    <path d="M 140 220 L 100 155" stroke="#0b0b0b" stroke-width="45" stroke-linecap="round" />
    
    <!-- Body -->
    <path d="M 150 140 C 150 70, 250 70, 250 140 L 270 270 C 275 325, 125 325, 130 270 Z" fill="#0b0b0b"/>
    
    <!-- White Belly -->
    <ellipse cx="200" cy="235" rx="45" ry="60" fill="#ffffff"/>
    
    <!-- Eyes -->
    <circle cx="180" cy="115" r="7.5" fill="#ffffff"/>
    <circle cx="220" cy="115" r="7.5" fill="#ffffff"/>
    
    <!-- Beak -->
    <path d="M 170 135 Q 200 123 230 135 Q 200 153 170 135 Z" fill="#f58220"/>
    
    <!-- Feet -->
    <path d="M 150 310 L 185 310" stroke="#f58220" stroke-width="30" stroke-linecap="round" />
    <path d="M 215 310 L 250 310" stroke="#f58220" stroke-width="30" stroke-linecap="round" />
  </g>
</svg>
